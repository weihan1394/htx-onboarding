server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE endpoint — must appear BEFORE the general /api/hr/ block
    # because nginx uses the most specific matching location.
    # proxy_buffering off is critical: without it, nginx holds events in memory
    # and the browser never receives them in real time.
    location ~ ^/api/hr/employees/[^/]+/onboarding/stream$ {
        proxy_pass http://hr-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Proxy HR service API
    location /api/hr/ {
        proxy_pass http://hr-svc:8080/api/hr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
