services:
  # ── Database Migrations ────────────────────────────────────────────────────
  hr-db-migrate:
    build: ../../../../hr-db
    container_name: hr-db-migrate
    command: migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/htx
      - FLYWAY_USER=${POSTGRES_ADMIN_USER}
      - FLYWAY_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
    networks:
      - htx-network
    restart: on-failure

  onboarding-db-migrate:
    build: ../../../../onboarding-db
    container_name: onboarding-db-migrate
    command: migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/htx
      - FLYWAY_USER=${POSTGRES_ADMIN_USER}
      - FLYWAY_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
    networks:
      - htx-network
    restart: on-failure
    depends_on:
      - hr-db-migrate

  # ── Application Services ───────────────────────────────────────────────────
  hr-svc:
    build: ../../../../hr-svc
    container_name: hr-svc
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=htx;Username=${HR_SVC_USER};Password=${HR_SVC_PASSWORD}
      - Services__WorkflowSvc=http://workflow-svc:8080
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - htx-network
    depends_on:
      - hr-db-migrate
    restart: unless-stopped

  onboarding-svc:
    build: ../../../../onboarding-svc
    container_name: onboarding-svc
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=htx;Username=${ONBOARDING_SVC_USER};Password=${ONBOARDING_SVC_PASSWORD}
      - ConnectionStrings__Redis=valkey:6379
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - htx-network
    depends_on:
      - onboarding-db-migrate
    restart: unless-stopped

  workflow-svc:
    build: ../../../../workflow-svc
    container_name: workflow-svc
    ports:
      - "5003:8080"
    environment:
      - Temporal__Host=temporal:7233
      - Temporal__Namespace=htx-onboarding
      - Services__OnboardingSvc=http://onboarding-svc:8080
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - htx-network
    depends_on:
      - onboarding-svc
    restart: unless-stopped

  hr-web:
    build: ../../../../hr-web
    container_name: hr-web
    ports:
      - "3000:8080"
    volumes:
      - ./data/hr-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - htx-network
    depends_on:
      - hr-svc
      - onboarding-svc
    restart: unless-stopped

networks:
  htx-network:
    external: true
